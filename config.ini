; ===========================================================================
;  Media Pipeline - Settings
; ===========================================================================
;
;  HOW TO USE THIS FILE
;  --------------------
;  - This is the ONLY file you need to edit to change how the watcher works.
;  - Each setting is "Name = Value". Change the value after the "=".
;  - Lines starting with ";" or "#" are notes and are ignored.
;  - The [Section] headers are just labels to keep things organized.
;  - After saving changes, double-click "Restart Watcher.bat" to apply them.
;  - If you delete this file, the watcher still runs using the built-in
;    defaults shown in the comments below.
;
;  Tip: text values like folder paths can be written with or without quotes.
; ===========================================================================


[General]
; Where all the watcher's folders live (input, output, logs, etc.).
; The default pipeline watches PipelineRoot\default\input.
; Use a drive/folder that exists on this PC. Default: D:\MediaPipeline
PipelineRoot = D:\MediaPipeline


[Output Copies]
; HOW MANY OUTPUT FILES each pipeline makes.
;
; The default pipeline alternates between two counts so consecutive files do
; not all get the same number of copies: the 1st, 3rd, 5th... file uses
; "Alternating", and the 2nd, 4th, 6th... file uses "Min". Set BOTH to the
; same number if you always want the same count.
DefaultPipelineAlternatingCopiesPerFile = 10     ; default: 8
DefaultPipelineMinCopiesPerFile = 10             ; default: 7

; Long-video pipeline: variants made per detected segment. Default: 3
LongCopiesPerSegment = 3

; Bulk image pipeline (images\input): variants per source image. Default: 20
ImageBulkCopiesPerFile = 20

; Set pipeline (sets\input): copies per source file in its own folder. Default: 10
SetCopiesPerFile = 10

; Set-batch pipeline (setbatch\input): how many complete sets per batch. Default: 10
SetBatchCount = 10


[Video Quality]
; Lower CRF = better quality + bigger files; higher = smaller + lower quality.
; Sensible range is roughly 18 (high quality) to 28 (smaller). Default: 24
Crf = 24

; libx264 speed/quality tradeoff: ultrafast, fast, medium, slow, veryslow.
; Slower = smaller files, takes longer. Default: medium
Preset = medium

; Audio quality for videos. e.g. 96k, 128k, 192k. Default: 128k
AudioBitrate = 128k

; Videos are shrunk so their width is at most this many pixels (never enlarged).
; Default: 1080
MaxWidth = 1080

; GPU acceleration. The watcher picks an encoder in this order and only uses one
; if a real test-encode succeeds, so it is safe to leave both on:
;   1. NVIDIA GPU (h264_nvenc)  - when PreferNvenc = true
;   2. AMD GPU    (h264_amf)    - when PreferAmf   = true
;   3. CPU        (libx264)     - always available as the fallback
; Set a value to false to skip that encoder. Both default: true
PreferNvenc = true
PreferAmf = true

; NVIDIA (NVENC) tuning - only used when the NVIDIA encoder runs. Advanced.
NvencPreset = p4    ; default: p4
NvencCq = 26        ; default: 26  (lower = better quality)
LongNvencCq = 28    ; default: 28

; AMD (AMF) tuning - only used when the AMD encoder runs. Advanced.
; AmfQuality: speed, balanced, or quality (slower = better). Default: balanced
; AmfQp / LongAmfQp: quality, lower = better (like NvencCq). Default: 24 / 26
AmfQuality = balanced   ; default: balanced
AmfQp = 24              ; default: 24  (lower = better quality)
LongAmfQp = 26          ; default: 26


[Output Size Caps]
; Default pipeline: cap each output video at this many MB (0 = no cap). Default: 8
DefaultMaxOutputSizeMB = 8
; If a video still won't fit, shrink width to this as a fallback. Default: 720
DefaultSizeCapFallbackMaxWidth = 720

; Long pipeline: same idea for segmented videos. Default: 8 / 720
LongMaxOutputSizeMB = 8
LongSizeCapFallbackMaxWidth = 720


[Images]
; How many images are processed at the same time (needs PowerShell 7).
; "auto" picks a safe number based on your CPU. Or set a whole number like 4.
; Default: auto
ImageProcessingConcurrency = 12

; Tiny random crop applied to bulk/set images, in permille (parts per 1000) of
; the image size. 5 = 0.5%, 20 = 2%. Keep these small. Default: 5 / 20
ImageBulkCropMinPermille = 5
ImageBulkCropMaxPermille = 20

; PNG output compression level for the bulk image pipeline. Lower is faster and
; larger; higher is smaller and slower. Old default was 6. Default: 1
ImageBulkPngCompressionLevel = 1

; PNG output compression level for the image-clean pipeline. Lower is faster and
; larger; higher is smaller and slower. Old default was 6. Default: 1
ImageCleanPngCompressionLevel = 1


[Video Trim]
; Each video variant trims a tiny random amount off the end, in milliseconds.
; Default: 15 to 95
MinTrimMs = 15
MaxTrimMs = 95


[Long Video]
; Target and minimum length (seconds) for each segment of a long video.
; Default: 15 / 11
LongSegmentTargetSeconds = 15
LongSegmentMinSeconds = 11


[Asset Store Manifest]
; The asset-store pipeline (assetstore\input) treats the whole folder as one
; batch and produces several complete "sets", each containing one processed copy
; of every source file, plus a manifest.json describing every generated variant.
;
; How many sets (complete copies of the whole group) each batch makes. With 14
; source videos and 15 sets you get 15 folders of 14 processed media. Default: 15
AssetStoreSetCount = 20

; Per-copy end-trim for asset-store VIDEOS, in milliseconds. Kept deliberately
; tiny ("tens of ms") so each rendition differs without changing length much.
; Default: 10 to 40
AssetStoreMinTrimMs = 10
AssetStoreMaxTrimMs = 40

; Schema string written into each manifest. Leave as-is unless the importer that
; reads the manifest expects a different version. Default: heatup.assetStoreMediaManifest.v1
AssetStoreManifestSchema = heatup.assetStoreMediaManifest.v1

; Legacy setting retained for older config files. Asset-store manifests now
; always write importRoot as "." so "set_NN/<file>" paths resolve next to the
; manifest, regardless of this value.
AssetStoreImportRoot =


[Timing]
; A file must stop changing for this many seconds before it is processed
; (lets browser downloads finish). Default: 3
StableSeconds = 3

; Give up waiting on a single file after this many seconds. Default: 600
TimeoutSeconds = 600

; How often the watcher checks the input folders, in seconds. Default: 2
PollSeconds = 2


[Archive]
; Move old output files into an "archive" folder so output folders stay tidy.
; true or false. Default: true
ArchiveEnabled = true

; Output files older than this many hours get archived. Default: 15
ArchiveAgeHours = 15

; How often (minutes) the watcher checks for files to archive. Default: 30
ArchiveCheckIntervalMinutes = 30


[Advanced]
; GPU bitrate ceiling as a fraction of the size-target bitrate on the first
; encode (helps land under the size cap in one pass). Default: 0.92
; Only change these if you understand the size-cap behavior.
DefaultNvencPrimaryMaxrateScale = 0.92
LongNvencPrimaryMaxrateScale = 0.92
